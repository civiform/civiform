<div th:fragment="date (question, messages)" th:with="questionId=${#strings.randomAlphanumeric(8)}">
  <div class="usa-form-group" th:id="${questionId}"
      th:with="dateQuestion=${question.createDateQuestion()},
               inputId=${#strings.randomAlphanumeric(8)}">
      <label class="usa-label" th:for="${inputId}">
        <span th:text="${question.getQuestionText()}"></span>
        <!-- Required asterisk -->
        <th:block th:if="${!question.isOptional()}">
          <div th:replace="~{applicant/ApplicantBaseFragment :: requiredAsterisk}"></div>
        </th:block>
      </label>
      <div th:id="${questionId} + '-description'" th:text="${question.getQuestionHelpText()}" class="usa-hint"></div>
      <!-- Display errors -->
      <div th:replace="~{questiontypes/QuestionBaseFragment :: validationErrors(${dateQuestion.getValidationErrors().get(question.getContextualizedPath())}, ${messages})}"></div>

      <div class="usa-date-picker">
        <input
          class="usa-input"
          th:id="${inputId}"
          th:name="${question.createDateQuestion().getDatePath().toString()}"
          th:aria-describedby="${questionId} + '-description'"
        />
      </div>
    </div>
</div>
