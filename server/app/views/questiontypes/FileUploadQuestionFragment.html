<div
  th:fragment="file-upload(question, questionRendererParams)"
  th:with="fileUploadQuestion=${question.createFileUploadQuestion()},
    questionId=${'id-' + #strings.randomAlphanumeric(8)},
    inputId=${'id-' + #strings.randomAlphanumeric(8)},
    hasErrors=${questionRendererParams.shouldShowErrors() && !fileUploadQuestion.getValidationErrors().isEmpty()},
    maxFiles=${question.getQuestionDefinition().getMaxFiles()}"
  th:id="${questionId}"
  class="cf-question-fileupload cf-applicant-question-field"
  th:classappend="${hasErrors ? 'cf-question-field-with-error' : ''}"
  data-testid="questionRoot"
  data-cf-file-upload-container
>
  <!--/* Title and Help Text */-->
  <div
    th:replace="~{questiontypes/QuestionBaseFragment :: titleAndHelpTextSingleInput(${question}, ${questionId}, ${inputId})}"
  ></div>
  <div class="usa-hint">
    <p
      th:if="${maxFiles.isPresent() and maxFiles.getAsInt() == 1}"
      th:text="#{input.singleFileUploadHint}"
    ></p>
    <p
      th:if="${maxFiles.isPresent() and maxFiles.getAsInt() > 1}"
      th:text="#{input.multipleFileUploadHint(${maxFiles.getAsInt()})}"
    ></p>
    <p
      th:unless="${maxFiles.isPresent()}"
      th:text="#{input.unlimitedFileUploadHint}"
    ></p>
  </div>

  <!--/* Server-side validation errors. The id is the OOB swap target for the
       file-upload-errors fragment in FileUploadOobFragments, returned by
       FileUploadQuestionPartial after htmx uploads/removes. */-->
  <div
    th:id="'cf-fileupload-validation-errors-' + ${question.getQuestionDefinition().getId()}"
    aria-atomic="true"
    aria-live="assertive"
    aria-relevant="additions text"
  >
    <th:block
      th:replace="~{questiontypes/QuestionBaseFragment :: validationErrors(${fileUploadQuestion.getValidationErrors().get(question.getContextualizedPath())}, ${questionRendererParams}, ${questionId})}"
    />
  </div>

  <!--/* Client-side validation errors. These are always in the DOM but hidden.
       file_upload.ts removes the hidden attribute to show them before the htmx
       request fires (e.g. when a required file is missing or the file is too large or the request failed). */-->
  <div
    hidden
    class="usa-alert usa-alert--error usa-alert--slim"
    data-fileupload-error="required"
  >
    <div class="usa-alert__body">
      <p
        class="usa-alert__text"
        th:text="#{toast.errorMessageOutline(#{validation.fileRequired})}"
      ></p>
    </div>
  </div>
  <div
    hidden
    class="usa-alert usa-alert--error usa-alert--slim"
    data-fileupload-error="too-large"
  >
    <div class="usa-alert__body">
      <p
        class="usa-alert__text"
        th:text="#{toast.errorMessageOutline(#{validation.fileTooLarge(${maxFileSizeMb})})}"
      ></p>
    </div>
  </div>
  <div
    hidden
    class="usa-alert usa-alert--error usa-alert--slim"
    data-fileupload-error="request-failed"
  >
    <div class="usa-alert__body">
      <p
        class="usa-alert__text"
        th:text="#{toast.errorMessageOutline(#{validation.fileUploadRequestFailed})}"
      ></p>
    </div>
  </div>

  <!--/* Upload status for screen readers (text updated by file_upload.ts). */-->
  <div
    th:if="${!isPreview}"
    class="usa-sr-only"
    data-fileupload-selection-status
    th:id="${questionId} + '-file-selection-status'"
    th:data-message-none="#{input.fileUploadSelectionStatusNone}"
    th:data-message-singular="#{input.fileUploadSelectionStatusSingular}"
    th:data-message-plural="#{input.fileUploadSelectionStatusPlural}"
  ></div>

  <!--/* File input. Triggers a htmx POST on change to upload the selected file. */-->
  <input
    th:id="${inputId}"
    class="usa-file-input"
    type="file"
    name="file"
    th:aria-describedby="${isPreview} ? ${questionId} + '-description' : |${questionId}-file-selection-status cf-fileupload-file-list-${question.getQuestionDefinition().getId()} ${questionId}-description cf-fileupload-validation-errors-${question.getQuestionDefinition().getId()}|"
    th:aria-labelledby="${questionId} + '-title'"
    th:aria-invalid="${hasErrors}"
    th:accept="${fileUploadAllowedFileTypeSpecifiers}"
    th:data-file-limit-mb="${maxFileSizeMb}"
    th:disabled="${!fileUploadQuestion.canUploadFile()}"
    th:aria-required="${!question.isOptional()}"
    th:hx-post="${!isPreview} ? ${hxSelectFileForUploadUrl}"
    th:hx-trigger="${!isPreview} ? 'change'"
    th:hx-encoding="${!isPreview} ? 'multipart/form-data'"
    th:hx-vals='|{"questionId": ${question.getQuestionDefinition().getId()}}|'
    hx-swap="none"
  />

  <!--/* Hidden by default. file_upload.ts adds the cf-file-uploading class to the
       parent question div during upload, and CSS makes cf-file-uploading-tag
       visible when that class is present. */-->
  <div
    class="cf-file-uploading-tag display-none padding-1 bg-warning-lighter text-warning-dark"
    role="alert"
    th:text="#{label.uploading}"
  ></div>

  <!--/* Render the OOB fragments inline on page load (oob=false). These same
       fragments are returned with oob=true after htmx uploads/removes to swap
       updated content into these elements by id. See FileUploadOobFragments.html. */-->
  <th:block
    th:if="${!isPreview}"
    th:replace="~{questiontypes/FileUploadOobFragments :: file-key-field(${fileUploadQuestion}, false)}"
  />
  <th:block
    th:if="${!isPreview}"
    th:replace="~{questiontypes/FileUploadOobFragments :: file-list-display(${fileUploadQuestion}, false)}"
  />

  <!--/* Live regions for upload, validation, and max-files announcements. */-->
  <div
    th:if="${!isPreview}"
    class="usa-sr-only"
    aria-live="assertive"
    aria-atomic="true"
    data-fileupload-uploading-status
    data-testid="fileupload-uploading-status"
    th:data-message="#{label.uploading}"
  ></div>
  <div
    class="usa-sr-only"
    aria-live="assertive"
    aria-atomic="true"
    data-fileupload-validation-status
    data-testid="fileupload-validation-status"
    th:id="'cf-fileupload-validation-status-' + ${question.getQuestionDefinition().getId()}"
  ></div>
  <div
    th:if="${maxFiles.isPresent()}"
    class="usa-sr-only"
    aria-live="assertive"
    aria-atomic="true"
    data-fileupload-max-files-status
    data-testid="fileupload-max-files-status"
    th:data-message="#{input.maxFilesReachedSr}"
    th:id="'cf-fileupload-max-files-status-' + ${question.getQuestionDefinition().getId()}"
  ></div>
</div>
