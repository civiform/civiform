<div th:fragment="applicant-question (question, questionRendererParams)">
    <th:block th:switch="${question.getType().getLabel()}">
        <!-- TODO: Implement other question types -->
        <th:block th:case="'Checkbox'">
            <div th:replace="~{questiontypes/CheckboxQuestionFragment :: checkbox(${question}, ${questionRendererParams})}"></div>
        </th:block>
    </th:block>
</div>
