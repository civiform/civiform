<!doctype html>
<html
  th:attr="lang=${preferredLanguage.code()},dir=${shouldDisplayRtl}? 'rtl'"
  data-testid="programSummary"
>
  <head
    th:replace="~{applicant/ApplicantBaseFragment :: pageHeaderScriptsAndLinks}"
  ></head>

  <body th:hx-headers='|{"CSRF-TOKEN":"${csrfToken}"}|'>
    <div th:replace="~{applicant/ApplicantBaseFragment :: skipNav}"></div>
    <div
      th:replace="~{applicant/shared/NavigationFragment :: pageHeader}"
    ></div>
    <main id="main-content" tabindex="-1">
      <div
        th:replace="~{applicant/shared/NavigationFragment :: adminPreviewBackButton(${goBackToAdminUrl})}"
      ></div>
      <div
        th:replace="~{applicant/blocks/TitleAndDescriptionFragment :: titleAndDescriptionFragment(${programTitle},${programShortDescription})}"
      ></div>
      <div
        th:replace="~{components/SeparatorLineFragment :: separatorLineFragment()}"
      ></div>

      <div
        th:if="${loginOnly and isGuest}"
        class="grid-container padding-top-4"
      >
        <div
          th:replace="~{applicant/shared/LoginOnlyAlertFragment :: loginOnly(${createAccountLink}, #{link.createAccountFromOverview})}"
        ></div>
      </div>

      <div
        class="grid-container"
        th:if="${!loginOnly or (loginOnly and !isGuest)}"
      >
        <div class="grid-row">
          <div class="tablet:grid-col-8">
            <div class="section-external tablet:display-flex tablet:flex-align-end">
              <div class="flex-fill">
                <div
                  th:replace="~{applicant/blocks/ProgressBarFragment :: progressBar(${progressBar})}"
                ></div>
              </div>
              <div
                class="margin-left-auto margin-bottom-3"
                th:insert="~{applicant/review/SubmitApplicationFragment :: submitButtons(${csrfToken},${submitUrl}, ${continueUrl},${hasCompletedAllBlocks})}"
              ></div>
            </div>

            <div
              th:replace="~{components/ToastFragment :: summaryToasts}"
            ></div>

            <div
              th:replace="~{components/AlertFragment :: alert(alertSettings=${eligibilityAlertSettings}, headingLevel='H2')}"
            ></div>
            <!-- If an alert is visible, add some extra spacing. -->
            <div
              th:if="${eligibilityAlertSettings.title.isPresent()}"
              class="section-spacing"
            ></div>

            <div
              th:replace="~{applicant/ApplicantBaseFragment :: requiredFieldsExplanation}"
            ></div>

            <ol class="application-summary usa-list--unstyled">
              <li class="" th:each="blockSummary: ${blockSummaries}">
                <div
                  th:replace="~{applicant/review/BlockSummaryFragment :: blockSummaryFragment(${blockSummary})}"
                ></div>
              </li>
            </ol>
            <div
              class="summary-button-section"
              th:replace="~{applicant/review/SubmitApplicationFragment :: submitButtons(${csrfToken},${submitUrl}, ${continueUrl},${hasCompletedAllBlocks})}"
            />
          </div>
        </div>
      </div>
      <div class="page-spacing"></div>
    </main>
    <div th:if="${isGuest and redirectedFromProgramSlug.isPresent()}">
      <div th:replace="~{applicant/shared/ModalFragment:: reviewLogin}"></div>
    </div>
    <div th:if="${duplicateSubmission.isPresent()}">
      <div id="show-duplicate-submission-modal"></div>
      <th:block
        th:replace="~{applicant/shared/ModalFragment:: preventDuplicateSubmission(${programTitle}, ${exitHref})}"
      >
      </th:block>
    </div>
    <footer
      th:replace="~{applicant/shared/NavigationFragment :: pageFooter}"
    ></footer>
    <th:block
      th:replace="~{components/GoogleTagManagerFragment :: tagManager(${optionalMeasurementId}, ${cspNonce})}"
    >
    </th:block>
  </body>
</html>
