name: Transifex Auto Lock Untranslated Strings

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read

jobs:
  lock_untranslated_strings:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'lock-transifex-strings')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute messages file diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --merge-base "$BASE_SHA" "$HEAD_SHA" -- server/conf/i18n/messages > /tmp/messages.diff
          if [ -s /tmp/messages.diff ]; then
            echo "modified=true" >> "$GITHUB_OUTPUT"
          else
            echo "modified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Python dependencies
        if: steps.diff.outputs.modified == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Run Transifex lock script
        if: steps.diff.outputs.modified == 'true'
        env:
          TRANSIFEX_API_TOKEN: ${{ secrets.TRANSIFEX_API_TOKEN }}
        run: ./bin/transifex-lock-untranslated --diff-file /tmp/messages.diff
