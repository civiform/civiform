name: Transifex Auto Lock Untranslated Strings

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  pull-requests: read

jobs:
  lock_untranslated_strings:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'lock-transifex-strings')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if source messages file was modified
        id: check_messages
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const messagesModified = files.data.some(file => file.filename === 'server/conf/i18n/messages');
            core.setOutput('modified', messagesModified ? 'true' : 'false');

      - name: Install Python dependencies
        if: steps.check_messages.outputs.modified == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Run Transifex lock script
        if: steps.check_messages.outputs.modified == 'true'
        env:
          TRANSIFEX_API_TOKEN: ${{ secrets.TRANSIFEX_API_TOKEN }}
        run: ./bin/transifex-lock-untranslated --language-code fr
